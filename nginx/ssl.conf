# HTTPS - loaded only after certificate is issued
server {
    listen 443 ssl;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # Certificates stored on persistent mount
    ssl_certificate     /home/data/certs/live/1e6ba5c88830f78f.sn.mynetname.net/fullchain.pem;
    ssl_certificate_key /home/data/certs/live/1e6ba5c88830f78f.sn.mynetname.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:WEBSSL:2m;
    ssl_session_timeout 10m;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
