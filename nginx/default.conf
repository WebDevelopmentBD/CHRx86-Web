# HTTP - serve normally + allow certbot challenge
server {
    listen 80;
    server_name 1e6ba5c88830f78f.sn.mynetname.net;
    root /var/www/html;
    index index.php index.html;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Serve normally on HTTP (redirects to HTTPS after cert issued)
    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}

# HTTPS - only active after certbot issues certificate
server {
    listen 443 ssl;
    server_name 1e6ba5c88830f78f.sn.mynetname.net;
    root /var/www/html;
    index index.php index.html;

    # Certificates stored on persistent mount
    ssl_certificate     /home/data/certs/live/1e6ba5c88830f78f.sn.mynetname.net/fullchain.pem;
    ssl_certificate_key /home/data/certs/live/1e6ba5c88830f78f.sn.mynetname.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
