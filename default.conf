# HTTP only - used before certificate is issued
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # Let's Encrypt HTTP-01 challenge - MUST be first, before any deny rules
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
        allow all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny hidden files - but NOT .well-known (handled above by ^~)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
